[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary info for failures/errors
addopts =
    -v
    --tb=short
    --cov=analysis
    --cov=core
    --cov=data
    --cov=scenarios
    --cov=services
    --cov=storage
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=30

# Ignore directories that should not be scanned
norecursedirs = .venv __pycache__ .git htmlcov

# Markers
markers =
    unit: Unit tests (no network, no DB)
    integration: Integration tests (may use SQLite)
    live: Tests requiring live network access
    smoke: Import/smoke tests
    regression: Regression tests for known patterns
